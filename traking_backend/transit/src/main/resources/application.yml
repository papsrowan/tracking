server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/logistics_platform
    username: logistics_user
    password: logistics_pass
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: true
  
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN

logging:
  level:
    com.transit.tracking: DEBUG
    org.springframework.security: DEBUG

app:
  cors:
    allowed-origins: http://localhost:3000
