version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: logistics-db
    environment:
      POSTGRES_DB: logistics_platform
      POSTGRES_USER: logistics_user
      POSTGRES_PASSWORD: logistics_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logistics-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics_user -d logistics_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./traking_backend/transit
      dockerfile: Dockerfile
    container_name: logistics-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/logistics_platform
      SPRING_DATASOURCE_USERNAME: logistics_user
      SPRING_DATASOURCE_PASSWORD: logistics_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - logistics-network

  frontend:
    build:
      context: ./tracking_front_end
      dockerfile: Dockerfile
    container_name: logistics-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - logistics-network

volumes:
  postgres_data:

networks:
  logistics-network:
    driver: bridge
